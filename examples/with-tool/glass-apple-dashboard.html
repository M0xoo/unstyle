<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glass Smart Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            color-scheme: light;
            font-family: "SF Pro Text", "Inter", system-ui, sans-serif;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background:
                radial-gradient(700px 360px at 15% 8%, rgba(255, 203, 155, 0.25), transparent 60%),
                radial-gradient(720px 420px at 70% 5%, rgba(164, 178, 255, 0.28), transparent 56%),
                radial-gradient(720px 420px at 75% 95%, rgba(157, 227, 255, 0.25), transparent 56%),
                linear-gradient(145deg, #c7c6db 0%, #babfd4 44%, #a8b6c8 100%);
            display: grid;
            place-items: center;
            padding: 28px;
            color: #2e3748;
        }

        .shell {
            width: min(1220px, 100%);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.52);
            background: linear-gradient(138deg, rgba(255, 255, 255, 0.32), rgba(255, 255, 255, 0.16));
            box-shadow: 0 30px 90px rgba(30, 40, 70, 0.18), inset 0 1px 0 rgba(255, 255, 255, 0.55);
            backdrop-filter: blur(20px) saturate(130%);
            padding: 18px;
        }

        .glass {
            border-radius: 22px;
            border: 1px solid rgba(255, 255, 255, 0.55);
            background: linear-gradient(140deg, rgba(255, 255, 255, 0.46), rgba(255, 255, 255, 0.22));
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(16px) saturate(128%);
        }

        .card {
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.52);
            background: linear-gradient(140deg, rgba(255, 255, 255, 0.56), rgba(255, 255, 255, 0.28));
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(14px);
        }
    </style>
</head>
<body>
    <div class="shell">
        <header class="glass px-4 md:px-5 py-3 flex flex-wrap gap-3 items-center">
            <div class="flex items-center gap-3 min-w-[220px]">
                <img src="https://images.unsplash.com/photo-1544723795-3fb6469f5b39?auto=format&fit=crop&w=100&q=60"
                    alt="User avatar" class="w-11 h-11 rounded-full object-cover border border-white/70">
                <div>
                    <p class="text-[28px] leading-none md:text-[30px] font-semibold tracking-tight">Welcome, James!</p>
                </div>
            </div>

            <div class="flex-1 min-w-[240px]">
                <div class="h-11 rounded-full bg-white/50 border border-white/70 flex items-center px-4 gap-3">
                    <span class="text-lg opacity-70">⌕</span>
                    <input type="text" value="Search any devices here" aria-label="Search devices"
                        class="bg-transparent outline-none w-full text-[15px] text-[#4a5568]">
                </div>
            </div>

            <div class="rounded-full bg-white/56 border border-white/70 p-1 flex items-center gap-1">
                <button class="h-9 px-4 rounded-full bg-white text-[#2f3847] font-medium text-sm border border-white/80">Light</button>
                <button class="h-9 px-4 rounded-full text-[#4f5a6d] font-medium text-sm">Dark</button>
            </div>
            <button class="w-10 h-10 rounded-full bg-white/56 border border-white/70 text-lg">◌</button>
        </header>

        <section class="mt-4 glass p-4 md:p-5">
            <div class="grid grid-cols-1 md:grid-cols-[62px_1fr] gap-4">
                <nav class="card p-2 flex md:flex-col items-center justify-between md:justify-start md:gap-3">
                    <button class="w-10 h-10 rounded-full bg-white border border-white/80 text-[#2d3646]">⌂</button>
                    <button class="w-10 h-10 rounded-full text-[#5d6778] hover:bg-white/40">⚡</button>
                    <button class="w-10 h-10 rounded-full text-[#5d6778] hover:bg-white/40">◍</button>
                    <button class="w-10 h-10 rounded-full text-[#5d6778] hover:bg-white/40">🔔</button>
                    <button class="w-10 h-10 rounded-full text-[#5d6778] hover:bg-white/40">◔</button>
                    <button class="w-10 h-10 rounded-full text-[#5d6778] hover:bg-white/40">⚙</button>
                </nav>

                <div class="grid gap-3 md:gap-4 md:grid-cols-12 auto-rows-[124px]">
                    <article class="card p-4 md:col-span-4">
                        <p class="text-sm text-[#5a6374] font-medium">17 July, 2023</p>
                        <div class="mt-4 flex items-end gap-3">
                            <p class="text-[48px] leading-none font-semibold">09:00</p>
                            <p class="text-[34px] leading-none pb-1">19°c</p>
                        </div>
                    </article>

                    <article class="card p-4 md:col-span-3">
                        <p class="text-sm font-medium text-[#4d596d]">Humidity</p>
                        <div class="mt-4 flex items-center gap-3">
                            <div class="w-16 h-16 rounded-full border-[6px] border-[#7c8cff] border-t-[#d8deff] border-r-[#5de2e7]"></div>
                            <p class="text-[42px] leading-none font-semibold">65<span class="text-2xl">%</span></p>
                        </div>
                    </article>

                    <article class="card p-4 md:col-span-5">
                        <p class="text-sm font-medium text-[#4d596d]">Total Consumption</p>
                        <div class="mt-4 grid grid-cols-6 gap-2 items-end h-16">
                            <div class="rounded-full bg-[#c6d8d3] h-7"></div>
                            <div class="rounded-full bg-[#c6d8d3] h-11"></div>
                            <div class="rounded-full bg-[#c6d8d3] h-9"></div>
                            <div class="rounded-full bg-[#c6d8d3] h-13"></div>
                            <div class="rounded-full bg-[#efbe71] h-8"></div>
                            <div class="rounded-full bg-[#c6d8d3] h-10"></div>
                        </div>
                        <p class="mt-2 text-right text-2xl font-semibold text-[#495466]">160</p>
                    </article>

                    <article class="card p-4 md:col-span-2">
                        <p class="text-[30px] font-semibold leading-tight">Smart<br>Light</p>
                    </article>

                    <article class="card p-4 md:col-span-2">
                        <p class="text-[30px] font-semibold leading-tight">Air<br>Conditioner</p>
                    </article>

                    <article class="card p-4 md:col-span-4 md:row-span-2">
                        <p class="text-sm font-medium text-[#4d596d]">Smart Lighting</p>
                        <div class="mt-3 flex gap-2 text-sm">
                            <span class="px-3 py-1.5 rounded-full bg-white/65">8 watt</span>
                            <span class="px-3 py-1.5 rounded-full bg-white/65">9 watt</span>
                            <span class="px-3 py-1.5 rounded-full bg-[#efbe71] text-white">12 watt</span>
                        </div>
                        <div class="mt-4 w-36 h-36 rounded-full border-[8px] border-[#f1cf53] border-r-[#dbe2dc] border-b-[#dbe2dc] mx-auto"></div>
                        <p class="text-center text-2xl -mt-24 font-semibold">80%</p>
                        <p class="text-center text-sm text-[#616c7f]">Intensity</p>
                    </article>

                    <article class="card p-4 md:col-span-4 md:row-span-2">
                        <p class="text-sm font-medium text-[#4d596d]">Thermostat</p>
                        <div class="mt-2 flex justify-between items-end">
                            <div class="w-36 h-36 rounded-full border-[8px] border-[#ebad45] border-r-[#d7dfd8] border-b-[#d7dfd8]"></div>
                            <p class="text-[44px] leading-none font-semibold">25°</p>
                        </div>
                        <div class="-mt-24 text-center">
                            <div class="w-16 h-10 mx-auto rounded-2xl bg-white/70 border border-white/80 grid place-items-center">☁</div>
                        </div>
                        <div class="mt-8 flex justify-between text-sm text-[#5a6576]">
                            <span>18°</span>
                            <span>30°</span>
                        </div>
                    </article>

                    <article class="card p-4 md:col-span-2">
                        <p class="text-[30px] font-semibold leading-tight">Door<br>Lock</p>
                    </article>

                    <article class="card p-4 md:col-span-2">
                        <p class="text-[30px] font-semibold leading-tight">Cleaning<br>Vacum</p>
                    </article>
                </div>
            </div>

            <div class="mt-5 card p-2.5 max-w-3xl mx-auto">
                <div class="flex flex-wrap gap-1.5 md:gap-2">
                    <button class="px-5 py-2 rounded-full bg-white border border-white/80 font-medium">Living Room</button>
                    <button class="px-5 py-2 rounded-full text-[#4f5b6d]">Bedroom</button>
                    <button class="px-5 py-2 rounded-full text-[#4f5b6d]">Kitchen</button>
                    <button class="px-5 py-2 rounded-full text-[#4f5b6d]">Dining Room</button>
                    <button class="px-5 py-2 rounded-full text-[#4f5b6d]">Play Room</button>
                    <button class="ml-auto w-10 h-10 rounded-full bg-white/70 border border-white/80 text-xl leading-none">+</button>
                </div>
            </div>
        </section>
    </div>
</body>
</html>
